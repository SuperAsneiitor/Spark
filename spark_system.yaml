# =============================================================================
# Spark 系统级配置（与项目 proj.yaml 分离）
# 路径：默认 <SPARK_HOME>/spark_system.yaml
#       或通过环境变量 SPARK_SYSTEM_CONFIG 指定（绝对路径或相对 SPARK 根目录）
# =============================================================================

license_check:
  # 是否在每个 spark CLI 命令执行前做账号授权检查（Linux 下用 whoami）
  enabled: false

  # 允许使用 Spark 的 OS 用户名列表（与 whoami 输出一致；可含 domain\user 形式）
  allowed_users: []
  #  - alice
  #  - bob

  # 可选：从外部文本文件加载名单（每行一个用户名，# 开头为注释）
  # allowed_users_file: share/license_allowlist.txt
